<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bannumhom — Fragrance Boutique</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #faf8f4;
    --bg2:      #ffffff;
    --bg3:      #f2ede4;
    --bg4:      #ede7db;
    --accent:   #8b6c3e;
    --accent2:  #b8924f;
    --text:     #1a1512;
    --text2:    #5a4e40;
    --muted:    #9c8e7e;
    --border:   rgba(139,108,62,0.15);
    --border2:  rgba(139,108,62,0.35);
    --serif:    'Cormorant Garamond', Georgia, serif;
    --sans:     'Jost', sans-serif;
    --shadow:   0 2px 18px rgba(100,80,40,0.08);
    --shadow2:  0 8px 40px rgba(100,80,40,0.14);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-weight: 300;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    text-align: center;
    padding: 56px 24px 44px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .header-deco {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 18px;
  }
  .header-deco::before, .header-deco::after {
    content: '';
    width: 60px; height: 1px;
    background: linear-gradient(to right, transparent, var(--accent2));
  }
  .header-deco::after { background: linear-gradient(to left, transparent, var(--accent2)); }
  .eyebrow {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--accent);
    text-transform: uppercase;
  }
  .store-name {
    font-family: var(--serif);
    font-size: 52px;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--text);
    line-height: 1;
    margin-bottom: 14px;
    display: block;
    outline: none;
  }
  .store-name:focus { border-bottom: 1px solid var(--accent2); }
  .store-tagline {
    font-family: var(--serif);
    font-style: italic;
    font-size: 17px;
    color: var(--muted);
    display: block;
    outline: none;
  }
  .store-tagline:focus { border-bottom: 1px dashed var(--accent2); }
  .edit-hint {
    margin-top: 16px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.07em;
  }
  .edit-hint em { color: var(--accent); font-style: normal; }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 28px;
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 32px 80px;
  }

  /* ── Card ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    box-shadow: var(--shadow);
    transition: box-shadow 0.3s, transform 0.3s, border-color 0.3s;
    animation: fadeUp 0.5s ease both;
  }
  .card:hover {
    box-shadow: var(--shadow2);
    transform: translateY(-4px);
    border-color: var(--border2);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Image ── */
  .card-img-wrap {
    position: relative;
    height: 240px;
    overflow: hidden;
    background: var(--bg3);
  }
  .card-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
    display: block;
  }
  .card:hover .card-img-wrap img { transform: scale(1.05); }

  .img-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--sans);
    letter-spacing: 0.05em;
  }
  .img-placeholder svg { opacity: 0.35; }

  .tag-badge {
    position: absolute;
    top: 12px; left: 12px;
    background: var(--accent);
    color: #fff;
    font-family: var(--sans);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 4px 11px;
    border-radius: 1px;
  }

  .img-change-btn {
    position: absolute;
    bottom: 10px; right: 10px;
    background: rgba(255,255,255,0.85);
    border: 1px solid var(--border2);
    color: var(--accent);
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.07em;
    padding: 5px 13px;
    border-radius: 2px;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s, background 0.2s;
    backdrop-filter: blur(4px);
  }
  .card:hover .img-change-btn { opacity: 1; }
  .img-change-btn:hover { background: rgba(255,255,255,1); }

  .delete-btn {
    position: absolute;
    top: 10px; right: 10px;
    background: rgba(255,255,255,0.88);
    border: 1px solid rgba(180,60,60,0.25);
    color: #c0605a;
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    z-index: 3;
  }
  .delete-btn:hover { background: rgba(255,220,220,0.95); border-color: rgba(180,60,60,0.55); }

  /* ── Image URL bar ── */
  .img-url-bar {
    display: none;
    padding: 8px 12px;
    background: var(--bg3);
    border-top: 1px solid var(--border);
    gap: 6px;
    align-items: center;
  }
  .img-url-bar.open { display: flex; }
  .img-url-bar input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 2px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 12px;
    padding: 5px 10px;
    outline: none;
  }
  .img-url-bar input:focus { border-color: var(--accent); }
  .img-url-bar button {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 0.06em;
  }
  .img-url-bar .cancel-img {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  /* ── Card body ── */
  .card-body { padding: 20px 22px 22px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }

  .product-name {
    font-family: var(--serif);
    font-size: 23px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
    flex: 1;
    outline: none;
  }

  .price-wrap { display: flex; align-items: baseline; gap: 3px; flex-shrink: 0; }
  .price-symbol { font-family: var(--sans); font-size: 11px; color: var(--accent2); letter-spacing: 0.06em; }
  .product-price {
    font-family: var(--serif);
    font-size: 22px;
    font-weight: 300;
    color: var(--accent);
    min-width: 60px;
    text-align: right;
    outline: none;
  }

  .product-desc {
    font-family: var(--serif);
    font-style: italic;
    font-size: 14px;
    color: var(--text2);
    line-height: 1.75;
    flex: 1;
    outline: none;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .tag-inline {
    font-family: var(--sans);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    outline: none;
  }

  /* ── Editable style ── */
  [contenteditable] {
    border-bottom: 1px dashed var(--border2);
    cursor: text;
    transition: border-color 0.2s;
  }
  [contenteditable]:hover { border-color: var(--accent2); }
  [contenteditable]:focus { border-color: var(--accent); border-bottom-style: solid; }

  /* ── Divider ── */
  .section-divider {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin: 0 32px;
    padding: 28px 0 0;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .section-divider::before, .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border2);
  }

  /* ── Add card ── */
  .add-card {
    background: transparent;
    border: 1.5px dashed var(--border2);
    border-radius: 3px;
    min-height: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: border-color 0.3s, color 0.3s, background 0.3s;
  }
  .add-card:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(139,108,62,0.04);
  }
  .add-card svg { transition: transform 0.3s; }
  .add-card:hover svg { transform: scale(1.15) rotate(90deg); }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(20,15,10,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(3px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 3px;
    padding: 36px 36px 28px;
    width: 460px;
    max-width: calc(100vw - 40px);
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow2);
    animation: modalIn 0.22s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-title {
    font-family: var(--serif);
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 28px;
    letter-spacing: 0.04em;
  }
  .modal-title em { color: var(--accent); font-style: italic; }

  .field { margin-bottom: 18px; }
  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input, .field textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 300;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); background: var(--bg2); }
  .field textarea { height: 90px; }

  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 9px 22px;
    border-radius: 2px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text2); }
  .btn-add {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 9px 26px;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-add:hover { background: var(--accent2); }
  .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Footer ── */
  .site-footer {
    text-align: center;
    padding: 28px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-transform: uppercase;
    background: var(--bg2);
  }
  .site-footer strong { color: var(--accent); font-weight: 400; }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    header { padding: 36px 20px 28px; }
    .store-name { font-size: 34px; letter-spacing: 0.08em; }
    .store-tagline { font-size: 14px; }
    .edit-hint { font-size: 10px; }
    .header-deco::before, .header-deco::after { width: 32px; }

    .section-divider { margin: 0 16px; font-size: 10px; }

    .grid {
      grid-template-columns: 1fr;
      gap: 20px;
      padding: 24px 16px 60px;
    }

    .card-img-wrap { height: 200px; }
    .img-change-btn { opacity: 1; font-size: 12px; padding: 6px 14px; }

    .card-body { padding: 16px 16px 18px; }
    .product-name { font-size: 20px; }
    .product-price { font-size: 20px; }
    .price-symbol { font-size: 10px; }
    .product-desc { font-size: 13px; }

    .add-card { min-height: 120px; flex-direction: row; gap: 10px; border-radius: 3px; }
    .add-card svg { width: 22px; height: 22px; }

    .modal { padding: 28px 20px 22px; }
    .modal-title { font-size: 22px; margin-bottom: 20px; }
    .field input, .field textarea { font-size: 16px; padding: 10px 12px; }
    .field textarea { height: 80px; }
    .modal-actions { flex-direction: column-reverse; gap: 8px; }
    .btn-cancel, .btn-add { width: 100%; text-align: center; padding: 12px; }

    .site-footer { padding: 20px 16px; font-size: 10px; }
  }

  @media (min-width: 601px) and (max-width: 900px) {
    .store-name { font-size: 42px; }
    .grid {
      grid-template-columns: repeat(2, 1fr);
      padding: 36px 24px 60px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-deco"><span class="eyebrow">Fragrance Boutique</span></div>
  <div class="store-name" contenteditable="true" spellcheck="false" title="Click to edit">Bannumhom</div>
  <div class="store-tagline" contenteditable="true" spellcheck="false" title="Click to edit">Rare fragrances, crafted for those who know.</div>
  <p class="edit-hint"><em>✦</em> Click any text to edit &nbsp;·&nbsp; Hover a card to change its image <em>✦</em></p>
</header>

<div class="section-divider">Our Collection</div>

<main class="grid" id="grid"></main>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <p class="modal-title">Add <em>new</em> fragrance</p>
    <div class="field"><label>Name *</label><input id="f-name" placeholder="e.g. Velvet Oud" /></div>
    <div class="field"><label>Price (LAK) *</label><input id="f-price" type="number" min="0" placeholder="e.g. 150000" /></div>
    <div class="field"><label>Description</label><textarea id="f-desc" placeholder="Describe the scent…"></textarea></div>
    <div class="field"><label>Image URL</label><input id="f-img" placeholder="https://…" /></div>
    <div class="field"><label>Tag (optional)</label><input id="f-tag" placeholder="e.g. New · Limited · Bestseller" /></div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-add" id="modal-confirm">Add fragrance</button>
    </div>
  </div>
</div>

<footer class="site-footer">
  <strong id="product-count">3</strong> fragrances &nbsp;·&nbsp; All edits are live
</footer>

<script>
const STORAGE_KEY = 'bannumhom_products';
const META_KEY    = 'bannumhom_meta';

const defaultProducts = [
  { id: 1, name: "Noir Absolu",    price: "185,000", desc: "A deep, smoky blend of oud, black amber, and dark woods. Seductive and long-lasting — crafted for evenings that leave a mark.",    image: "https://images.unsplash.com/photo-1541643600914-78b084683702?w=500&q=80", tag: "Bestseller" },
  { id: 2, name: "Rose de Minuit", price: "145,000", desc: "Midnight rose kissed with bergamot and sandalwood. An intimate floral that blooms on the skin through the night.",                  image: "https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?w=500&q=80", tag: "New" },
  { id: 3, name: "Carte Blanche",  price: "210,000", desc: "Clean linen, soft musk, and a whisper of white cedar. The scent of quiet luxury — subtle, refined, unforgettable.",                 image: "https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?w=500&q=80", tag: "Limited" },
];

// ── Load from localStorage ──
let saved = null;
try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {}
const products = (saved && saved.length) ? saved : defaultProducts.map(p => ({...p}));
let nextId = products.reduce((m, p) => Math.max(m, p.id), 0) + 1;

// ── Load store meta ──
let meta = { name: 'Bannumhom', tagline: 'Rare fragrances, crafted for those who know.' };
try { const m = JSON.parse(localStorage.getItem(META_KEY)); if (m) meta = m; } catch(e) {}

// ── Persist helpers ──
function persist() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(products)); } catch(e) {}
}
function persistMeta() {
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch(e) {}
}

// ── Show save toast ──
function showToast() {
  let t = document.getElementById('save-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'save-toast';
    t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#8b6c3e;color:#fff;font-family:Jost,sans-serif;font-size:12px;letter-spacing:0.1em;padding:8px 20px;border-radius:2px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;text-transform:uppercase';
    t.textContent = '✓ Saved';
    document.body.appendChild(t);
  }
  t.style.opacity = 1;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.opacity = 0, 1800);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function updateCount() {
  document.getElementById('product-count').textContent = products.length;
}

function buildImgContent(url, name) {
  if (!url) return buildPlaceholder();
  return `<img src="${esc(url)}" alt="${esc(name)}" onload="this.style.opacity=1" onerror="handleImgError(this)" style="opacity:0;transition:opacity 0.4s" />`;
}
function buildPlaceholder() {
  return `<div class="img-placeholder"><svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>No image</span></div>`;
}
function handleImgError(img) {
  const wrap = img.parentElement;
  img.remove();
  const div = document.createElement('div');
  div.innerHTML = buildPlaceholder();
  wrap.insertBefore(div.firstElementChild, wrap.firstChild);
}

function renderCard(p, idx) {
  return `
  <div class="card" id="card-${p.id}" style="animation-delay:${idx*0.07}s">
    <button class="delete-btn" onclick="deleteProduct(${p.id})" title="Remove">✕</button>
    <div class="card-img-wrap" id="imgwrap-${p.id}">
      ${buildImgContent(p.image, p.name)}
      <span class="tag-badge" id="tag-badge-${p.id}" style="${p.tag?'':'display:none'}">${esc(p.tag||'')}</span>
      <button class="img-change-btn" onclick="openImgBar(${p.id})">⊕ Change image</button>
    </div>
    <div class="img-url-bar" id="imgbar-${p.id}">
      <input type="text" id="imgurl-${p.id}" placeholder="Paste image URL…" value="${esc(p.image||'')}" onkeydown="if(event.key==='Enter')applyImg(${p.id})" />
      <button onclick="applyImg(${p.id})">Apply</button>
      <button class="cancel-img" onclick="closeImgBar(${p.id})">✕</button>
    </div>
    <div class="card-body">
      <div class="card-header">
        <div class="product-name" contenteditable="true" spellcheck="false" onblur="saveField(${p.id},'name',this)">${esc(p.name)}</div>
        <div class="price-wrap">
          <span class="price-symbol">LAK</span>
          <div class="product-price" contenteditable="true" spellcheck="false" onblur="saveField(${p.id},'price',this)">${esc(p.price)}</div>
        </div>
      </div>
      <div class="product-desc" contenteditable="true" spellcheck="false" onblur="saveField(${p.id},'desc',this)">${esc(p.desc)}</div>
      <div class="card-footer">
        <span class="tag-inline" contenteditable="true" spellcheck="false" onblur="saveTag(${p.id},this)" title="Click to edit tag">${esc(p.tag||'Add tag…')}</span>
      </div>
    </div>
  </div>`;
}

function renderAddBtn() {
  return `<div class="add-card" onclick="openModal()">
    <svg width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    <span>Add Fragrance</span>
  </div>`;
}

function render() {
  document.getElementById('grid').innerHTML = products.map((p,i) => renderCard(p,i)).join('') + renderAddBtn();
  updateCount();
}

function saveField(id, field, el) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const val = el.innerText.trim();
  if (val) { p[field] = val; persist(); showToast(); }
  else el.innerText = p[field];
}

function saveTag(id, el) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const val = el.innerText.trim();
  p.tag = (val === 'Add tag…') ? '' : val;
  const badge = document.getElementById('tag-badge-' + id);
  if (badge) { badge.textContent = p.tag; badge.style.display = p.tag ? '' : 'none'; }
  persist(); showToast();
}

function deleteProduct(id) {
  const idx = products.findIndex(p => p.id === id);
  if (idx < 0) return;
  products.splice(idx, 1);
  persist(); showToast();
  render();
}

function openImgBar(id) {
  document.getElementById('imgbar-' + id).classList.add('open');
  document.getElementById('imgurl-' + id).focus();
}
function closeImgBar(id) {
  document.getElementById('imgbar-' + id).classList.remove('open');
}
function applyImg(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  const url = document.getElementById('imgurl-' + id).value.trim();
  p.image = url;
  const wrap = document.getElementById('imgwrap-' + id);
  const old = wrap.querySelector('img, .img-placeholder');
  if (old) old.remove();
  const tmp = document.createElement('div');
  tmp.innerHTML = buildImgContent(url, p.name);
  wrap.insertBefore(tmp.firstElementChild || tmp.firstChild, wrap.querySelector('.img-change-btn'));
  closeImgBar(id);
  persist(); showToast();
}

// ── Store name & tagline ──
const nameEl    = document.querySelector('.store-name');
const taglineEl = document.querySelector('.store-tagline');
nameEl.innerText    = meta.name;
taglineEl.innerText = meta.tagline;
nameEl.addEventListener('blur', () => {
  const v = nameEl.innerText.trim();
  if (v) { meta.name = v; persistMeta(); showToast(); }
  else nameEl.innerText = meta.name;
});
taglineEl.addEventListener('blur', () => {
  const v = taglineEl.innerText.trim();
  if (v) { meta.tagline = v; persistMeta(); showToast(); }
  else taglineEl.innerText = meta.tagline;
});

// ── Modal ──
function openModal() {
  ['f-name','f-price','f-desc','f-img','f-tag'].forEach(id => { document.getElementById(id).value = ''; document.getElementById(id).style.borderColor = ''; });
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-cancel').onclick = closeModal;
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('modal-confirm').onclick = () => {
  const name  = document.getElementById('f-name').value.trim();
  const price = document.getElementById('f-price').value.trim();
  if (!name)  { document.getElementById('f-name').style.borderColor  = '#c0605a'; document.getElementById('f-name').focus(); return; }
  if (!price) { document.getElementById('f-price').style.borderColor = '#c0605a'; document.getElementById('f-price').focus(); return; }
  products.push({ id: nextId++, name, price, desc: document.getElementById('f-desc').value.trim() || 'A beautiful new fragrance.', image: document.getElementById('f-img').value.trim(), tag: document.getElementById('f-tag').value.trim() });
  closeModal();
  persist(); showToast();
  render();
};
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

render();
</script>
</body>
</html>
